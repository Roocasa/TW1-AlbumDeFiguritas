<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>Crear cuenta | Taller Web I</title>

  <!-- Boostrap core css -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

  <!-- custom style -->
  <link rel="stylesheet" th:href="@{/css/main.css}" />

</head>

<body class="auth-shell">

  <nav class="navbar auth-navbar">
    <div class="container">
      <a class="navbar-brand" href="#">UNLAM</a>
      <span class="auth-navbar__text">Primer acceso</span>
    </div>
  </nav>

  <main class="auth-main">
    <section class="auth-card">
      <div class="auth-card__header">
        <span class="auth-card__eyebrow">Nuevo usuario</span>
        <h1>Crea tu cuenta y empieza tu coleccion</h1>
        <p>Registra tu email institucional o personal y define una contrasena segura para entrar al album.</p>
      </div>

      <form class="auth-form" th:action="@{/registrarme}" method="POST" th:object="${usuario}">
        <div th:if="${error != null}" class="auth-alert" th:text="'Error: ' + ${error}"></div>

        <label class="auth-field">
          <span>Email</span>
          <input
            th:field="*{email}"
            id="email"
            type="email"
            class="form-control auth-input"
            placeholder="nombre@correo.com"
            autocomplete="email"
            required />
        </label>

        <label class="auth-field">
          <span>De que pais sos?</span>
          <select th:field="*{pais}" id="pais" class="form-select auth-input" required>
            <option value="">Selecciona tu pais</option>
            <option value="Argentina">Argentina</option>
            <option value="Brasil">Brasil</option>
            <option value="Chile">Chile</option>
            <option value="Colombia">Colombia</option>
            <option value="Mexico">Mexico</option>
            <option value="Uruguay">Uruguay</option>
            <option value="Otro">Otro</option>
          </select>
        </label>

        <label class="auth-field">
          <span>Contrasena</span>
          <input
            th:field="*{password}"
            type="password"
            id="password"
            class="form-control auth-input"
            placeholder="Minimo 6 caracteres"
            autocomplete="new-password"
            required />
        </label>

        <label class="auth-field">
          <span>Repite la contrasena</span>
          <input
            id="confirm-password"
            type="password"
            class="form-control auth-input"
            placeholder="Repite la contrasena"
            autocomplete="new-password"
            required />
        </label>

        <p id="password-hint" class="auth-hint">Usa al menos 6 caracteres.</p>

        <button id="btn-registrarme" class="btn auth-button" type="submit" disabled>Crear cuenta</button>
      </form>

      <div class="auth-card__footer">
        <span>Ya tienes cuenta?</span>
        <a th:href="@{/login}">Volver al login</a>
      </div>
    </section>
  </main>

  <!-- Boostrap core js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>

  <script type="module" th:src="@{/js/register.js}"></script>

</body>

</html>
