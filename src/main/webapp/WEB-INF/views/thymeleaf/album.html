<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>Album por paises | Album 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" th:href="@{/css/main.css}" />
  <link rel="stylesheet" th:href="@{/css/album.css}" />
</head>

<body class="album-shell" th:data-country-url="@{/album/pais/}">
  <header class="home-topbar profile-topbar">
    <a class="home-topbar__brand profile-topbar__brand" th:href="@{/home}">
      <img
        class="home-topbar__logo"
        th:src="@{/img/mundial_2026.png}"
        src="/img/mundial_2026.png"
        alt="Logo Mundial 2026" />
      <span class="home-topbar__title profile-topbar__title">Album 2026</span>
    </a>
    <nav class="profile-topbar__actions" aria-label="Navegacion principal">
      <a th:href="@{/home}">Inicio</a>
      <a th:href="@{/perfil}">Perfil</a>
      <a th:href="@{/login}">Salir</a>
    </nav>
  </header>

  <main class="album-layout">
    <section class="album-hero" aria-labelledby="titulo-album">
      <div>
        <span class="album-hero__tag">Mundial 2026</span>
        <h1 id="titulo-album">Album virtual</h1>
        <p>Recorre las 48 selecciones clasificadas y prepara los espacios para pegar tus figuritas.</p>
        <div class="album-stats" th:if="${album != null}">
          <article>
            <strong th:text="${album.totalFiguritas}">576</strong>
            <span>Total</span>
          </article>
          <article>
            <strong th:text="${album.figuritasPegadas}">0</strong>
            <span>Pegadas</span>
          </article>
          <article>
            <strong th:text="${album.figuritasFaltantes}">576</strong>
            <span>Faltan</span>
          </article>
        </div>
      </div>
      <img
        class="album-hero__image"
        th:src="@{/img/Album.jpg}"
        src="/img/Album.jpg"
        alt="Tapa del album 2026" />
    </section>

    <form class="album-filters" th:action="@{/album}" method="get" aria-label="Filtros del album">
      <label for="album-group-filter">
        Grupo
        <select id="album-group-filter" name="grupo">
          <option value="" th:selected="${grupoSeleccionado == null || grupoSeleccionado == ''}">Todos</option>
          <option
            th:each="grupo : ${grupos}"
            th:value="${'grupo-' + #strings.toLowerCase(grupo)}"
            th:text="${'Grupo ' + grupo}"
            th:selected="${grupoSeleccionado == 'grupo-' + #strings.toLowerCase(grupo)}">
            Grupo A
          </option>
        </select>
      </label>
      <label for="album-country-filter">
        Pais
        <input
          id="album-country-filter"
          name="pais"
          type="search"
          placeholder="Buscar seleccion"
          autocomplete="off"
          th:value="${paisBuscado}">
      </label>
      <button type="submit">Filtrar</button>
      <a id="album-clear-filters" class="album-filters__clear" th:href="@{/album}">Limpiar</a>
    </form>

    <p class="album-empty" th:if="${#maps.isEmpty(paisesPorGrupo)}">
      No encontramos selecciones para ese filtro.
    </p>

    <section
      class="album-section"
      th:each="entrada : ${paisesPorGrupo}"
      th:id="${'grupo-' + #strings.toLowerCase(entrada.key)}"
      th:aria-labelledby="${'titulo-grupo-' + #strings.toLowerCase(entrada.key)}">
      <h2
        th:id="${'titulo-grupo-' + #strings.toLowerCase(entrada.key)}"
        th:text="${'Grupo ' + entrada.key}">
        Grupo A
      </h2>
      <div class="album-country-grid">
        <article class="country-page" th:each="pais : ${entrada.value}">
          <header>
            <span th:text="${pais.codigo}" th:data-flag-code="${pais.codigoBandera}">MEX</span>
            <div class="country-page__title">
              <div class="country-page__heading">
                <h3 th:text="${pais.nombre}">Mexico</h3>
                <span
                  class="country-page__pending"
                  th:if="${#maps.containsKey(pendientesPorPais, pais.codigo) and pendientesPorPais[pais.codigo] > 0}"
                  th:text="'!'"
                  th:title="${pendientesPorPais[pais.codigo] + ' figuritas pendientes para pegar'}">!</span>
              </div>
              <p th:text="${(#maps.containsKey(pegadasPorPais, pais.codigo) ? pegadasPorPais[pais.codigo] : 0) + ' / 12 pegadas'}">0 / 12 pegadas</p>
            </div>
          </header>
          <div class="sticker-slots">
            <span th:each="numero : ${figuritas}" th:text="${numero}">1</span>
          </div>
        </article>
      </div>
    </section>
  </main>

  <footer class="home-footer">Proyecto taller web 1</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>
  <script th:src="@{/js/album.js}"></script>
</body>

</html>
