<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>Mi perfil</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body>
  <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" th:href="@{/home}">Album de figuritas</a>
    </div>
  </nav>

  <main role="main" class="container mt-5 pt-4">
    <section class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <h1 class="mb-4">Mi perfil</h1>

        <div class="card">
          <div class="card-body">
            <p class="mb-2">
              <strong>Email:</strong>
              <span th:text="${usuario.email}">usuario@unlam.edu.ar</span>
            </p>
            <p class="mb-2">
              <strong>Rol:</strong>
              <span th:text="${usuario.rol}">USUARIO</span>
            </p>
            <p class="mb-0">
              <strong>Estado:</strong>
              <span th:text="${usuario.activo} ? 'Activo' : 'Inactivo'">Activo</span>
            </p>
          </div>
        </div>

        <a th:href="@{/home}" class="btn btn-primary mt-3">Volver al inicio</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>
</body>

</html>
