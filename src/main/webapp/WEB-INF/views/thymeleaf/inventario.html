<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title th:text="${soloRepetidas} ? 'Mis repetidas | Taller Web I' : 'Mi inventario | Taller Web I'">Mi inventario | Taller Web I</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body class="home-shell">
  <header class="home-topbar profile-topbar">
    <a class="home-topbar__brand profile-topbar__brand" th:href="@{/home}">
      <img
        class="home-topbar__logo"
        th:src="@{/img/mundial_2026.png}"
        src="/img/mundial_2026.png"
        alt="Logo Mundial 2026" />
      <span class="home-topbar__title profile-topbar__title">Album 2026</span>
    </a>
    <nav class="profile-topbar__actions" aria-label="Navegacion principal">
      <a th:href="@{/home}">Inicio</a>
      <a th:href="@{/perfil}">Perfil</a>
      <a th:href="@{/login}">Salir</a>
    </nav>
  </header>

<main class="home-layout">
    <section class="home-grid sobres-contenedor mb-5">
        <div class="home-panel sobres">
            <img src="/spring/img/sobres/SOBRE_REGULAR.png" alt="Sobre común">
            <div class="sobre-badge" th:text="${session.USUARIO != null ? session.USUARIO.paquetesDisponibles : 0}">0</div>
            <div class="sobre-contenido">
                <h2>Sobre común</h2>
                <a th:href="@{/abrir-paquete}" class="btn">Abrir sobre</a>
            </div>
        </div>
    </section>

    <section class="inventory-heading text-center text-white mb-4">
        <h2
            class="mb-2"
            style="font-family: 'Bebas Neue'; letter-spacing: 2px;"
            th:text="${soloRepetidas} ? 'Mis repetidas' : 'Mis figuritas'">
            Mis figuritas
        </h2>
        <p
            class="mb-0"
            th:text="${soloRepetidas} ? 'Acá ves solo las figuritas repetidas para organizar tus intercambios.' : 'Ordená tu inventario y pegá las que todavía te faltan.'">
            Ordená tu inventario y pegá las que todavía te faltan.
        </p>
        <a
            th:if="${soloRepetidas}"
            th:href="@{/inventario}"
            class="profile-button mt-3"
            style="min-width: 220px;">
            Ver inventario completo
        </a>
    </section>

    <div class="inventario-controles">
        <div class="d-flex align-items-center gap-2">
            <label class="text-white fw-bold mb-0">Ordenar por:</label>
            <select id="sort-select" class="form-select w-auto shadow-sm">
                <option value="numero">Numeración en el álbum</option>
                <option value="score">Score</option>
            </select>
        </div>
        <div class="form-check form-switch ms-md-4">
            <input class="form-check-input" type="checkbox" id="check-pegables" checked>
            <label class="form-check-label text-warning fw-bold" for="check-pegables"> Para pegar </label>
        </div>
    </div>

    <div th:if="${figuritas == null or figuritas.empty}" class="alert alert-info text-center bg-dark text-white border-secondary">
        <span th:text="${soloRepetidas} ? 'Todavía no tenés repetidas. Abrí más sobres para empezar a intercambiar.' : 'Todavía no tenés figuritas. Abrí un sobre para empezar.'">
            Todavía no tenés figuritas. Abrí un sobre para empezar.
        </span>
    </div>

    <div id="figuritas-grid" class="d-flex flex-wrap justify-content-center gap-3 pb-5">

        <div th:each="item : ${figuritas}"
             class="figurita-card shadow-lg"
             th:classappend="${item.sePuedePegar} ? 'is-pegable' : ''"
             style="position: relative;"
             th:data-pais="${item.figurita.seleccion}"
             th:data-score="${item.figurita.score}"
             th:data-numero="${item.figurita.ordenAlbum}"
             th:data-nombre="${item.figurita.nombreJugador != null ? item.figurita.nombreJugador.toLowerCase() : ''}"
             th:data-pegable="${item.sePuedePegar}">

            <div th:if="${item.cantidadRepetidas > 0}"
                 class="figurita-card__duplicates">
                <span th:text="${'x' + item.cantidadRepetidas}"></span>
            </div>

            <img th:src="@{/img/fondos_figs/FONDO_FIG_COMUN.png}"
                 alt="Fondo"
                 class="figurita-card__background">

            <img th:if="${item.figurita.pais != null and item.figurita.pais.codigoBandera != null}"
                 th:src="${'https://flagcdn.com/' + item.figurita.pais.codigoBandera + '.svg'}"
                 alt="Bandera"
                 class="figurita-card__flag">

            <img th:if="${item.figurita.imagenUrl != null}"
                 th:src="${item.figurita.imagenUrl}"
                 alt="Jugador"
                 class="figurita-card__player-image">

            <div class="figurita-card__number"
                 th:text="${item.figurita.numeroDentroDelPais}">
            </div>

            <div class="figurita-card__footer">
                <h6 class="figurita-card__name"
                    th:text="${item.figurita.tipo != null and item.figurita.tipo.name() == 'ESCUDO' ? 'Escudo de ' + item.figurita.pais.nombre : item.figurita.nombreJugador}"></h6>
                <p class="figurita-card__country"
                   th:text="${item.figurita.tipo != null and item.figurita.tipo.name() == 'ESCUDO' ? (item.figurita.pais != null ? item.figurita.pais.nombre : '') : (item.figurita.club != null ? item.figurita.club : (item.figurita.pais != null ? item.figurita.pais.nombre : ''))}"></p>
            </div>

            <a th:if="${item.sePuedePegar}" th:href="@{/pegar-figurita(id=${item.figurita.id})}" class="pegar-overlay text-warning text-center fw-bold fs-5" style="z-index: 10;">
                <span>Pegar en<br>el álbum</span>
            </a>
        </div>

    </div>
</main>

<div th:if="${paqueteAbierto}" class="modal fade show" tabindex="-1" style="display: block; background: rgba(15, 34, 66, 0.95);">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content" style="background-color: #f8fafc; border: none; border-radius: 16px; overflow: hidden;">

            <div class="modal-header border-0 text-center d-flex justify-content-center" style="background: linear-gradient(135deg, #1f6fd1 0%, #144a8a 100%);">
                <h4 class="modal-title text-white w-100 mt-2" style="font-family: 'Bebas Neue'; font-size: 2.5rem; letter-spacing: 2px;">
                    SOBRE ABIERTO
                </h4>
                <a th:href="@{/inventario}" class="btn-close btn-close-white position-absolute" style="right: 1.5rem; top: 1.5rem;"></a>
            </div>

            <div class="modal-body py-5 px-4">
                <div class="d-flex justify-content-center flex-wrap gap-4">

                    <div th:each="fig : ${figuritasNuevas}" th:if="${fig != null}"
                         class="pack-result-card">

                        <div class="figurita-card shadow-lg figurita-card--pack">
                            <img th:src="@{/img/fondos_figs/FONDO_FIG_COMUN.png}"
                                 alt="Fondo"
                                 class="figurita-card__background">

                            <img th:if="${fig.pais != null and fig.pais.codigoBandera != null}"
                                 th:src="${'https://flagcdn.com/' + fig.pais.codigoBandera + '.svg'}"
                                 alt="Bandera"
                                 class="figurita-card__flag">

                            <img th:if="${fig.imagenUrl != null}"
                                 th:src="${fig.imagenUrl}"
                                 alt="Jugador"
                                 class="figurita-card__player-image">

                            <div class="figurita-card__number"
                                 th:text="${fig.numeroDentroDelPais}">
                            </div>

                            <div class="figurita-card__footer">
                                <h6 class="figurita-card__name"
                                    th:text="${fig.tipo != null and fig.tipo.name() == 'ESCUDO' ? 'Escudo de ' + fig.pais.nombre : fig.nombreJugador}"></h6>
                                <p class="figurita-card__country"
                                   th:text="${fig.tipo != null and fig.tipo.name() == 'ESCUDO' ? (fig.pais != null ? fig.pais.nombre : '') : (fig.club != null ? fig.club : (fig.pais != null ? fig.pais.nombre : ''))}"></p>
                            </div>
                        </div>

                        <div class="pack-result-card__info">
                            <strong th:text="${fig.tipo != null and fig.tipo.name() == 'ESCUDO' ? 'Escudo de ' + fig.pais.nombre : fig.nombreJugador}"></strong>
                            <span th:text="${fig.tipo != null and fig.tipo.name() == 'ESCUDO' ? (fig.pais != null ? fig.pais.nombre : '') : (fig.club != null ? fig.club : (fig.pais != null ? fig.pais.nombre : ''))}"></span>
                        </div>
                    </div>

                </div>
            </div>

            <div class="modal-footer border-0 justify-content-center pb-4 bg-white">
                <a th:href="@{/inventario}" class="btn px-5 py-2 fw-bold text-white shadow" style="background-color: #a30505; border-radius: 999px; font-size: 1.2rem;">
                    GUARDAR EN INVENTARIO
                </a>
            </div>

        </div>
    </div>
</div>

<footer class="home-footer">Proyecto taller web 1</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/inventario-ordenamiento-figs.js}"></script>

</body>
</html>
