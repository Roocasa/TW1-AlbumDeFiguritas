<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Mi Inventario | Taller Web I</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body class="home-shell">
<header class="home-topbar">
    <div class="home-topbar__brand">
        <img class="home-topbar__logo" th:src="@{/img/mundial_2026.png}" alt="Logo Mundial 2026" />
        <span class="home-topbar__title profile-topbar__title">Album 2026</span>
    </div>
    <nav class="home-topbar__actions" aria-label="Navegacion principal">
        <a th:href="@{/home}">Inicio</a>
        <a th:href="@{/perfil}">Perfil</a>
        <a th:href="@{/login}">Salir</a>
    </nav>
</header>

<main class="home-layout">
    <section class="home-grid sobres-contenedor mb-5">

        <div class="home-panel sobres">
            <img src="/spring/img/sobres/SOBRE_REGULAR.png" alt="Sobre Común">

            <div class="sobre-badge" th:text="${session.USUARIO != null ? session.USUARIO.paquetesDisponibles : 0}">0</div>

            <div class="sobre-contenido">
                <h2>Sobre Común</h2>
                <a th:href="@{/abrir-paquete(premium=false)}" class="btn">Abrir Sobre</a>
            </div>
        </div>

        <div class="home-panel sobres">
            <img src="/spring/img/sobres/SOBRE_GOLD.png" alt="Sobre Premium">

            <div class="sobre-badge" th:text="${session.USUARIO != null ? session.USUARIO.paquetesPremiumDisponibles : 0}">0</div>

            <div class="sobre-contenido">
                <h2>Sobre Premium</h2>
                <a th:href="@{/abrir-paquete(premium=true)}" class="btn btn-premium">Abrir Premium</a>
            </div>
        </div>

    </section>

    <h2 class="text-white mb-4" style="font-family: 'Bebas Neue'; letter-spacing: 2px;">Mis Figuritas</h2>

    <div th:if="${figuritas == null or figuritas.empty}" class="alert alert-info text-center bg-dark text-white border-secondary">
        Aún no tenés figuritas ¡Abrí un sobre para empezar!
    </div>

    <div class="d-flex flex-wrap justify-content-center gap-3 pb-5">
        <div th:each="fig : ${figuritas}"
             class="figurita-card shadow-lg"
             th:classappend="'fondo-' + ${fig.rareza.name()}">
            <div class="p-2 text-center" style="position: relative; z-index: 1; margin-top: 25px;">
                <h6 class="mb-1 fw-bold text-white" style="text-shadow: 2px 2px 4px #000;" th:text="${fig.nombre}">Nombre</h6>
                <span class="badge bg-dark border border-secondary" th:text="${fig.rareza}">RAREZA</span>
            </div>
        </div>
    </div>
</main>

<div th:if="${paqueteAbierto}" class="modal fade show" tabindex="-1" style="display: block; background: rgba(0,0,0,0.9);">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content bg-dark text-white border-warning">
            <div class="modal-header border-secondary">
                <h4 class="modal-title text-warning" style="font-family: 'Bebas Neue'; font-size: 1.8rem;">¡SOBRE ABIERTO!</h4>
                <a th:href="@{/inventario}" class="btn-close btn-close-white"></a>
            </div>
            <div class="modal-body py-4">
                <div class="d-flex justify-content-center flex-wrap gap-3">
                    <div th:each="fig : ${figuritasNuevas}" th:if="${fig != null}"
                         class="figurita-card shadow-lg"
                         th:classappend="'fondo-' + ${fig.rareza.name()}">
                        <div class="p-2 text-center" style="position: relative; z-index: 1; margin-top: 25px;">
                            <h6 class="mb-1 fw-bold text-white" th:text="${fig.nombre}">Nombre</h6>
                            <span class="badge bg-dark border" th:text="${fig.rareza}">RAREZA</span>
                        </div>
                        <a th:href="@{/pegar-figurita(id=${fig.id})}" class="pegar-overlay text-warning text-center fw-bold fs-5 p-2">
                            Pegar en<br>el álbum
                        </a>
                    </div>
                </div>
            </div>
            <div class="modal-footer border-secondary justify-content-center">
                <a th:href="@{/inventario}" class="btn btn-warning px-5 fw-bold text-dark">GUARDAR</a>
            </div>
        </div>
    </div>
</div>

<footer class="home-footer">Proyecto taller web 1</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
