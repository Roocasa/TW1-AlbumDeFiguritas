<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>Crear cuenta | Taller Web I</title>

  <!-- Boostrap core css -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

  <!-- custom style -->
  <link rel="stylesheet" th:href="@{/css/main.css}" />
  <link rel="stylesheet" th:href="@{/css/auth.css}" />

</head>

<body class="auth-shell">

  <nav class="navbar auth-navbar">
    <div class="container">
      <a class="navbar-brand" href="#">UNLAM</a>
      <span class="auth-navbar__text">Primer acceso</span>
    </div>
  </nav>

  <main class="auth-main">
    <section class="auth-card">
      <div class="auth-card__header">
        <span class="auth-card__eyebrow">Nuevo usuario</span>
        <h1>Crea tu cuenta y empieza tu coleccion</h1>
        <p>Registra tu email institucional o personal y define una contrasena segura para entrar al album.</p>
      </div>

      <form class="auth-form" th:action="@{/registrarme}" method="POST" th:object="${usuario}">
        <div th:if="${error != null}" class="auth-alert" th:text="'Error: ' + ${error}"></div>

        <label class="auth-field">
          <span>Email</span>
          <input
            th:field="*{email}"
            id="email"
            type="email"
            class="form-control auth-input"
            placeholder="nombre@correo.com"
            autocomplete="email"
            required />
        </label>

        <label class="auth-field">
          <span>De que pais sos?</span>
          <select th:field="*{pais}" id="pais" class="form-select auth-input" required>
            <option value="">Selecciona tu pais</option>
            <option value="Argentina">Argentina</option>
            <option value="Brasil">Brasil</option>
            <option value="Chile">Chile</option>
            <option value="Colombia">Colombia</option>
            <option value="Mexico">Mexico</option>
            <option value="Uruguay">Uruguay</option>
            <option value="Otro">Otro</option>
          </select>
        </label>

        <label class="auth-field">
          <span>Contrasena</span>
          <div class="auth-password-control position-relative">
            <input
              th:field="*{password}"
              type="password"
              id="password"
              class="form-control auth-input"
              placeholder="Minimo 6 caracteres"
              autocomplete="new-password"
              required />
            <button
              type="button"
              class="auth-password-toggle position-absolute top-50 end-0 translate-middle-y border-0 bg-transparent me-2 d-inline-flex align-items-center justify-content-center"
              style="z-index: 4; width: 40px; height: 40px;"
              data-password-toggle="password"
              aria-label="Mostrar contrasena"
              aria-pressed="false">
              <svg class="auth-password-toggle__icon auth-password-toggle__icon--show" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" aria-hidden="true">
                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="auth-password-toggle__icon auth-password-toggle__icon--hide" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" aria-hidden="true">
                <path d="M2 12s3.5-6 10-6c2.1 0 3.8 0.6 5.2 1.4M22 12s-3.5 6-10 6c-2.1 0-3.8-0.6-5.2-1.4"></path>
                <path d="M4 4l16 16"></path>
                <path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"></path>
              </svg>
            </button>
          </div>
        </label>

        <label class="auth-field">
          <span>Repite la contrasena</span>
          <div class="auth-password-control position-relative">
            <input
              id="confirm-password"
              type="password"
              class="form-control auth-input"
              placeholder="Repite la contrasena"
              autocomplete="new-password"
              required />
            <button
              type="button"
              class="auth-password-toggle position-absolute top-50 end-0 translate-middle-y border-0 bg-transparent me-2 d-inline-flex align-items-center justify-content-center"
              style="z-index: 4; width: 40px; height: 40px;"
              data-password-toggle="confirm-password"
              aria-label="Mostrar contrasena"
              aria-pressed="false">
              <svg class="auth-password-toggle__icon auth-password-toggle__icon--show" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" aria-hidden="true">
                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="auth-password-toggle__icon auth-password-toggle__icon--hide" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" aria-hidden="true">
                <path d="M2 12s3.5-6 10-6c2.1 0 3.8 0.6 5.2 1.4M22 12s-3.5 6-10 6c-2.1 0-3.8-0.6-5.2-1.4"></path>
                <path d="M4 4l16 16"></path>
                <path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"></path>
              </svg>
            </button>
          </div>
        </label>

        <p id="password-hint" class="auth-hint">Usa al menos 6 caracteres.</p>

        <button id="btn-registrarme" class="btn auth-button" type="submit" disabled>Crear cuenta</button>
      </form>

      <div class="auth-card__footer">
        <span>Ya tienes cuenta?</span>
        <a th:href="@{/login}">Volver al login</a>
      </div>
    </section>
  </main>

  <!-- Boostrap core js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>

  <script th:src="@{/js/password-toggle.js}"></script>
  <script type="module" th:src="@{/js/register.js}"></script>

</body>

</html>
