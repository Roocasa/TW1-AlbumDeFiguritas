<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Iniciar sesion | Taller Web I</title>

    <!-- Boostrap core css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <!-- custom style -->
    <link rel="stylesheet" th:href="@{/css/main.css}" />

</head>

<body class="auth-shell">

    <nav class="navbar auth-navbar">
        <div class="container">
            <a class="navbar-brand" href="#">UNLAM</a>
            <span class="auth-navbar__text">Album de figuritas</span>
        </div>
    </nav>

    <main class="auth-main">
        <section class="auth-card">
            <div class="auth-card__header">
                <span class="auth-card__eyebrow">Bienvenido</span>
                <h1>Inicia sesion para seguir completando tu album</h1>
                <p>Entra con tu cuenta para abrir sobres, ver tu inventario y seguir tu progreso.</p>
            </div>

            <form class="auth-form" th:action="@{/validar-login}" method="POST" th:object="${datosLogin}">
                <div th:if="${error != null}" class="auth-alert" th:text="'Error: ' + ${error}"></div>

                <label class="auth-field">
                    <span>Email</span>
                    <input
                        th:field="*{email}"
                        id="email"
                        type="email"
                        class="form-control auth-input"
                        placeholder="tuusuario@unlam.edu.ar"
                        autocomplete="email"
                        required />
                </label>

                <label class="auth-field">
                    <span>Contrasena</span>
                    <input
                        th:field="*{password}"
                        type="password"
                        id="password"
                        class="form-control auth-input"
                        placeholder="Minimo 6 caracteres"
                        autocomplete="current-password"
                        required />
                </label>

                <button id="btn-login" class="btn auth-button" type="submit" disabled>Entrar</button>
            </form>

            <div class="auth-card__footer">
                <span>Si todavia no tienes cuenta,</span>
                <a id="btn-register" th:href="@{/nuevo-usuario}">registrate aca</a>
            </div>
        </section>
    </main>

    <!-- Boostrap core js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>

    <script type="module" th:src="@{/js/login.js}"></script>
</body>

</html>
