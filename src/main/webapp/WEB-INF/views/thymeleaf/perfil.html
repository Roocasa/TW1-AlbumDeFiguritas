<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>Mi perfil</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body class="profile-shell">
  <header class="home-topbar profile-topbar">
    <a class="home-topbar__brand profile-topbar__brand" th:href="@{/home}">
      <img
        class="home-topbar__logo"
        th:src="@{/img/mundial_2026.png}"
        src="/img/mundial_2026.png"
        alt="Logo Mundial 2026" />
      <span class="home-topbar__title profile-topbar__title">Album 2026</span>
    </a>
    <nav class="profile-topbar__actions" aria-label="Navegacion de perfil">
      <a th:href="@{/home}">Inicio</a>
      <a th:href="@{/login}">Salir</a>
    </nav>
  </header>

  <main class="profile-layout">
    <section class="profile-hero">
      <div class="profile-hero__copy">
        <span class="home-panel__tag">Coleccionista</span>
        <h1>Mi perfil</h1>
        <p>Gestiona tus datos de usuario y revisa el estado de tu cuenta dentro del album.</p>
      </div>

      <div class="profile-card">
        <div class="profile-card__header">
          <span class="profile-avatar" aria-hidden="true">Foto</span>
          <div>
            <span class="profile-card__label">Cuenta</span>
            <h2 th:text="${usuario.email}">usuario@unlam.edu.ar</h2>
          </div>
        </div>

        <div class="profile-stats">
          <article class="profile-stat">
            <span>Email</span>
            <strong th:text="${usuario.email}">usuario@unlam.edu.ar</strong>
          </article>
          <article class="profile-stat">
            <span>Pais</span>
            <strong th:text="${usuario.pais != null ? usuario.pais : 'Sin definir'}">Argentina</strong>
          </article>
          <article class="profile-stat">
            <span>Rol</span>
            <strong th:text="${usuario.rol}">USUARIO</strong>
          </article>
          <article class="profile-stat">
            <span>Estado</span>
            <strong th:text="${usuario.activo} ? 'Activo' : 'Inactivo'">Activo</strong>
          </article>
        </div>

        <div class="profile-card__footer">
          <a th:href="@{/home}" class="profile-button">Volver al inicio</a>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>
</body>

</html>
