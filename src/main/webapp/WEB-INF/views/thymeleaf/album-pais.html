<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title th:text="${nombrePais} + ' | Album 2026'">Pais | Album 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" th:href="@{/css/main.css}" />
  <link rel="stylesheet" th:href="@{/css/album.css}" />
</head>

<body class="album-shell">
  <header class="home-topbar profile-topbar">
    <a class="home-topbar__brand profile-topbar__brand" th:href="@{/home}">
      <img
        class="home-topbar__logo"
        th:src="@{/img/mundial_2026.png}"
        src="/img/mundial_2026.png"
        alt="Logo Mundial 2026" />
      <span class="home-topbar__title profile-topbar__title">Album 2026</span>
    </a>
    <nav class="profile-topbar__actions" aria-label="Navegacion principal">
      <a th:href="@{/home}">Inicio</a>
      <a th:href="@{/perfil}">Perfil</a>
      <a th:href="@{/login}">Salir</a>
    </nav>
  </header>

  <main class="album-layout">
    <section class="country-detail-hero" aria-labelledby="titulo-pais">
      <a class="country-detail-hero__back" th:href="@{/album}">Volver al album</a>
      <div
        class="country-detail-hero__badge"
        th:text="${codigoPais}"
        th:data-country-code="${codigoPais}"
        th:title="${codigoPais}"
        th:aria-label="${codigoPais}">ARG</div>
      <div>
        <span class="album-hero__tag">Seleccion</span>
        <h1 id="titulo-pais" th:text="${nombrePais}">Argentina</h1>
      </div>
    </section>

    <section class="country-sticker-section" aria-labelledby="titulo-figuritas">
      <h2 id="titulo-figuritas">Figuritas</h2>
      <div class="country-sticker-grid">
        <article class="country-sticker" th:each="numero : ${figuritas}">
          <div class="country-sticker__image">
            <span th:text="${codigoPais}">ARG</span>
            <strong th:text="${numero}">1</strong>
          </div>
          <div class="country-sticker__body">
            <h3 th:text="'Figurita ' + ${numero}">Figurita 1</h3>
            <p th:text="${nombrePais}">Argentina</p>
          </div>
        </article>
      </div>
    </section>
  </main>

  <footer class="home-footer">Proyecto taller web 1</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>
  <script th:src="@{/js/album.js}"></script>
</body>

</html>
