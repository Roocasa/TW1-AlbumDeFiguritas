<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>Album 2026 | Taller Web I</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body class="home-shell">
  <header class="home-topbar">
    <div class="home-topbar__brand">
      <img
        class="home-topbar__logo"
        th:src="@{/img/mundial_2026.png}"
        src="/img/mundial_2026.png"
        alt="Logo Mundial 2026" />
      <span class="home-topbar__title profile-topbar__title">Album 2026</span>
    </div>
    <nav class="home-topbar__actions" aria-label="Navegacion principal">
      <a th:href="@{/perfil}">Perfil</a>
      <a th:href="@{/login}">Salir</a>
    </nav>
  </header>

  <main class="home-layout">
    <section class="home-grid">
      <a class="home-panel home-panel--album" th:href="@{/album}" href="/album">
        <img
          class="home-panel__album-image"
          th:src="@{/img/Album.jpg}"
          src="/img/Album.jpg"
          alt="Tapa del album 2026" />
      </a>

      <a class="home-panel home-panel--repe" th:href="@{/inventario(soloRepetidas=true)}">
        <span class="home-panel__tag">Intercambio</span>
        <h2>Mis Repetidas</h2>
        <p>Entra directo a las figuritas que ya podes cambiar.</p>
      </a>

      <a class="home-panel home-panel--packs" th:href="@{/inventario}">
        <span class="home-panel__tag">Packs</span>
        <h2>Abrir Sobres</h2>
        <p>Abre tus sobres y aprovecha los 2 paquetes gratis de cada dia.</p>
        <div class="home-panel__countdown">
          <span>Proximo paquete diario en</span>
          <strong
            id="daily-pack-countdown"
            class="home-panel__countdown-time"
            th:attr="data-next-reset-ms=${proximoPaqueteDiarioEpochMs}">
            00:00:00
          </strong>
        </div>
      </a>
    </section>
  </main>

  <footer class="home-footer">Proyecto taller web 1</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const countdown = document.getElementById('daily-pack-countdown');
      if (!countdown) {
        return;
      }

      const nextResetMs = Number(countdown.dataset.nextResetMs || 0);
      if (!nextResetMs) {
        return;
      }

      function formatTime(totalSeconds) {
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        return [hours, minutes, seconds]
          .map(function (value) {
            return String(value).padStart(2, '0');
          })
          .join(':');
      }

      function updateCountdown() {
        const remainingMs = nextResetMs - Date.now();

        if (remainingMs <= 0) {
          countdown.textContent = 'Disponible ahora';
          return;
        }

        const remainingSeconds = Math.floor(remainingMs / 1000);
        countdown.textContent = formatTime(remainingSeconds);
      }

      updateCountdown();
      window.setInterval(updateCountdown, 1000);
    });
  </script>
</body>

</html>
