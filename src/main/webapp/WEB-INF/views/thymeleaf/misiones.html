<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>Misiones y logros | Taller Web I</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/main.css}" />
  <link rel="stylesheet" th:href="@{/css/home.css}" />
  <link rel="stylesheet" th:href="@{/css/misiones.css}" />
</head>

<body class="home-shell">
  <header class="home-topbar profile-topbar">
    <a class="home-topbar__brand profile-topbar__brand" th:href="@{/home}">
      <img class="home-topbar__logo" th:src="@{/img/mundial_2026.png}" src="/img/mundial_2026.png"
        alt="Logo Mundial 2026" />
      <span class="home-topbar__title profile-topbar__title">Album 2026</span>
    </a>
    <nav class="profile-topbar__actions" aria-label="Navegacion principal">
      <div th:replace="fragments/notificaciones :: campana"></div>
      <span class="coin-pill" aria-label="Monedas disponibles">
        <span class="coin-pill__icon" aria-hidden="true"></span>
        <span th:text="${session.USUARIO != null ? session.USUARIO.monedas : 0}">0</span>
      </span>
      <a th:href="@{/home}">Inicio</a>
      <a th:href="@{/inventario}">Inventario</a>
      <a th:href="@{/login}">Salir</a>
    </nav>
  </header>

  <main class="home-layout missions-layout">
    <div class="container">
      <div th:if="${mensajeExito}" class="alert alert-success text-center shadow-sm mb-3" th:text="${mensajeExito}">
        Mision canjeada.
      </div>
      <div th:if="${error}" class="alert alert-danger text-center shadow-sm mb-3" th:text="${error}">
        No se pudo canjear.
      </div>

      <section class="missions-heading">
        <span>Misiones</span>
        <h1>Logros y recompensas</h1>
        <p>Completa objetivos del album y canjea premios para seguir juntando figuritas.</p>
      </section>

      <section class="missions-grid" aria-label="Listado de misiones">
        <article th:each="estado : ${misiones}" class="mission-card"
          th:classappend="${estado.canjeada} ? ' mission-card--claimed' : (${estado.disponibleParaCanjear} ? ' mission-card--ready' : '')">
          <div class="mission-card__header">
            <div>
              <span class="mission-card__eyebrow"
                th:text="${estado.canjeada} ? 'Canjeada' : (${estado.disponibleParaCanjear} ? 'Lista para canjear' : 'En progreso')">
                En progreso
              </span>
              <h2 th:text="${estado.mision.titulo}">Primer sobre</h2>
            </div>
            <strong class="mission-card__reward" th:text="${estado.mision.textoRecompensa}">25 monedas</strong>
          </div>

          <p class="mission-card__description" th:text="${estado.mision.descripcion}">
            Abri tu primer sobre del album.
          </p>

          <div class="mission-progress" aria-label="Progreso de la mision">
            <div class="mission-progress__bar">
              <span th:style="${'width: ' + estado.porcentaje + '%'}"></span>
            </div>
            <div class="mission-progress__text">
              <span th:text="${estado.progreso + ' / ' + estado.objetivo}">0 / 1</span>
              <span th:text="${estado.porcentaje + '%'}">0%</span>
            </div>
          </div>

          <form th:if="${estado.disponibleParaCanjear}" th:action="@{/misiones/canjear}" method="post">
            <input type="hidden" name="codigo" th:value="${estado.mision.codigo}">
            <button type="submit" class="profile-button mission-card__action">Canjear recompensa</button>
          </form>

          <button th:if="${estado.canjeada}" type="button" class="mission-card__locked" disabled>
            Recompensa canjeada
          </button>

          <button th:if="${!estado.canjeada and !estado.disponibleParaCanjear}" type="button"
            class="mission-card__locked" disabled>
            Completa la mision
          </button>
        </article>
      </section>
    </div>
  </main>

  <footer class="home-footer">Proyecto taller web 1</footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
